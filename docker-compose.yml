services:
  mongodb:
    image: mongo:8.0
    container_name: bank-transactions-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: bank_transactions
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0.2
    container_name: bank-transactions-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank-transactions-app
    ports:
      - "8080:8080"
    environment:
      SPRING_MONGODB_URI: mongodb://mongodb:27017/bank_transactions
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
